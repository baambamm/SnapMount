<!DOCTYPE HTML>
<html>
<head>
	<title>SnapMount | TV Mount Services Phoenix</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<style>
		body {
			font-family: Arial;
			background: #0f172a;
			color: white;
			text-align: center;
			padding: 40px;
		}

		.container {
			max-width: 600px;
			margin: auto;
		}

		select, button {
			padding: 10px;
			margin: 10px;
			width: 100%;
			border-radius: 8px;
			border: none;
		}

		button {
			background: #2563eb;
			color: white;
			cursor: pointer;
		}

		.result {
			margin-top: 20px;
			padding: 20px;
			border-radius: 10px;
			background: #1e293b;
		}

		a {
			color: #60a5fa;
		}
	</style>
</head>

<body>

<div class="container">

	<h1>SnapMount</h1>
	<p>Professional TV Mounting in Phoenix, Arizona</p>

	<h2>Get Your Exact Quote</h2>

	<select id="tvsize"></select>

	<select id="wall">
		<option value="drywall">Drywall</option>
		<option value="brick">Brick (+40)</option>
		<option value="concrete">Concrete (+55)</option>
	</select>

	<select id="conceal">
		<option value="false">No Cable Concealment</option>
		<option value="true">Cable Concealment (+45)</option>
	</select>

	<select id="soundbar">
		<option value="false">No Soundbar</option>
		<option value="true">Soundbar (+35)</option>
	</select>

	<button onclick="calculate()">Calculate Price</button>

	<div id="result" class="result" style="display:none;">
		<p id="total"></p>
		<p id="deposit"></p>
		<p id="remaining"></p>

		<button onclick="checkout('deposit')">Book with Deposit</button>
		<button onclick="checkout('full')">Pay in Full</button>
		<button onclick="checkout('in_person')">Pay in Person</button>
	</div>

	<br><br>

	<p>📞 <a href="tel:6025823932">(602) 582-3932</a></p>
	<p>📧 <a href="mailto:snapmountaz@gmail.com">snapmountaz@gmail.com</a></p>

</div>

<script>

// tamaños reales
const sizes = [32,40,43,50,55,65,70,75,77,83,85];

// precios base
const prices = {
	32: 99,
	40: 109,
	43: 109,
	50: 119,
	55: 129,
	65: 149,
	70: 159,
	75: 169,
	77: 179,
	83: 189,
	85: 189
};

// llenar dropdown
const select = document.getElementById("tvsize");
sizes.forEach(s => {
	select.innerHTML += `<option value="${s}">${s}" TV</option>`;
});

function calculate(){

	let size = document.getElementById("tvsize").value;
	let wall = document.getElementById("wall").value;
	let conceal = document.getElementById("conceal").value === "true";
	let soundbar = document.getElementById("soundbar").value === "true";

	let total = prices[size];

	if(wall === "brick") total += 40;
	if(wall === "concrete") total += 55;
	if(conceal) total += 45;
	if(soundbar) total += 35;

	let deposit = Math.round(total * 0.4);
	let remaining = total - deposit;

	document.getElementById("total").innerText = "Total: $" + total;
	document.getElementById("deposit").innerText = "Deposit (40%): $" + deposit;
	document.getElementById("remaining").innerText = "Remaining: $" + remaining;

	document.getElementById("result").style.display = "block";
}

async function checkout(type){

	if(type === "in_person"){
		alert("We will contact you to schedule the installation.");
		return;
	}

	alert("Stripe backend not connected yet.\nNext step is setting backend.");
}

</script>

</body>
</html>
