<!DOCTYPE HTML>
<html>
<head>
	<title>SnapMount | TV Mount Services Phoenix</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<style>
		body {
			margin: 0;
			font-family: Arial;
			background: linear-gradient(180deg, #0f172a, #020617);
			color: white;
		}

		.container {
			max-width: 1100px;
			margin: auto;
			padding: 40px 20px;
		}

		.hero {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
			align-items: center;
		}

		.card {
			background: rgba(255,255,255,0.05);
			border-radius: 20px;
			padding: 30px;
			backdrop-filter: blur(10px);
		}

		h1 {
			font-size: 48px;
			margin: 10px 0;
		}

		button {
			padding: 12px 20px;
			border-radius: 10px;
			border: none;
			cursor: pointer;
			margin-right: 10px;
		}

		.primary {
			background: #2563eb;
			color: white;
		}

		.secondary {
			background: rgba(255,255,255,0.1);
			color: white;
		}

		.stats {
			display: flex;
			gap: 10px;
			margin-top: 20px;
		}

		.stat {
			background: rgba(255,255,255,0.05);
			padding: 10px;
			border-radius: 10px;
			text-align: center;
			flex: 1;
			font-size: 14px;
		}

		/* TELE ANIMADA 🔥 */
		.tv {
			height: 250px;
			border-radius: 20px;
			background: linear-gradient(145deg,#1e3a8a,#020617);
			position: relative;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.tv::before {
			content: "";
			position: absolute;
			width: 70%;
			height: 60%;
			border: 8px solid black;
			border-radius: 12px;
		}

		.screen {
			position: absolute;
			width: 65%;
			height: 50%;
			background: linear-gradient(145deg,#1d4ed8,#020617);
			border-radius: 10px;
		}

		.line {
			position: absolute;
			width: 60%;
			height: 2px;
			background: white;
			transform: rotate(-20deg);
		}

		.arrow {
			width: 10px;
			height: 10px;
			border-top: 2px solid white;
			border-right: 2px solid white;
			position: absolute;
		}

		.arrow1 {
			left: 20%;
			top: 60%;
			transform: rotate(135deg);
		}

		.arrow2 {
			right: 20%;
			top: 40%;
			transform: rotate(-45deg);
		}

		.label {
			position: absolute;
			background: rgba(0,0,0,0.7);
			padding: 5px 10px;
			border-radius: 20px;
			font-weight: bold;
		}

		select {
			padding: 10px;
			margin: 10px 0;
			width: 100%;
			border-radius: 10px;
		}

		.result {
			margin-top: 20px;
			background: rgba(37,99,235,0.2);
			padding: 20px;
			border-radius: 10px;
			display: none;
		}

		@media(max-width:800px){
			.hero {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body>

<div class="container">

	<div class="hero">

		<div class="card">
			<p>Phoenix, Arizona • TV Mounting</p>
			<h1>Clean installs.<br>Sharp finish.</h1>
			<p>Professional TV mounting with a smoother booking experience.</p>

			<button class="primary">Get Exact Quote</button>
			<button class="secondary">Call Now</button>

			<div class="stats">
				<div class="stat">Fast Quotes</div>
				<div class="stat">Secure Setup</div>
				<div class="stat">Flexible Payment</div>
			</div>
		</div>

		<div class="card tv">
			<div class="screen"></div>
			<div class="line"></div>
			<div class="arrow arrow1"></div>
			<div class="arrow arrow2"></div>
			<div class="label">32" - 85"</div>
		</div>

	</div>

	<h2>Get Your Exact Quote</h2>

	<select id="tvsize"></select>

	<select id="wall">
		<option value="drywall">Drywall</option>
		<option value="brick">Brick (+40)</option>
		<option value="concrete">Concrete (+55)</option>
	</select>

	<select id="conceal">
		<option value="false">No Cable Concealment</option>
		<option value="true">Cable Concealment (+45)</option>
	</select>

	<select id="soundbar">
		<option value="false">No Soundbar</option>
		<option value="true">Soundbar (+35)</option>
	</select>

	<button class="primary" onclick="calculate()">Calculate Price</button>

	<div id="result" class="result">
		<p id="total"></p>
		<p id="deposit"></p>
		<p id="remaining"></p>

		<button onclick="checkout('deposit')">Book with Deposit</button>
		<button onclick="checkout('full')">Pay in Full</button>
		<button onclick="checkout('in_person')">Pay in Person</button>
	</div>

	<br><br>

	<p>📞 (602) 582-3932</p>
	<p>📧 snapmountaz@gmail.com</p>

</div>

<script>

const sizes = [32,40,43,50,55,65,70,75,77,83,85];

const prices = {
	32: 99,
	40: 109,
	43: 109,
	50: 119,
	55: 129,
	65: 149,
	70: 159,
	75: 169,
	77: 179,
	83: 189,
	85: 189
};

const select = document.getElementById("tvsize");
sizes.forEach(s => {
	select.innerHTML += `<option value="${s}">${s}" TV</option>`;
});

function calculate(){

	let size = document.getElementById("tvsize").value;
	let wall = document.getElementById("wall").value;
	let conceal = document.getElementById("conceal").value === "true";
	let soundbar = document.getElementById("soundbar").value === "true";

	let total = prices[size];

	if(wall === "brick") total += 40;
	if(wall === "concrete") total += 55;
	if(conceal) total += 45;
	if(soundbar) total += 35;

	let deposit = Math.round(total * 0.4);
	let remaining = total - deposit;

	document.getElementById("total").innerText = "Total: $" + total;
	document.getElementById("deposit").innerText = "Deposit (40%): $" + deposit;
	document.getElementById("remaining").innerText = "Remaining: $" + remaining;

	document.getElementById("result").style.display = "block";
}

function checkout(type){
	if(type === "in_person"){
		alert("We will contact you to schedule.");
		return;
	}
	alert("Stripe aún no conectado.");
}

</script>

</body>
</html>
