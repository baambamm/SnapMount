<!DOCTYPE HTML>
<html lang="en">
<head>
	<title>SnapMount | TV Mount Services Phoenix</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="description" content="Professional TV mounting services in Phoenix, Arizona. Clean installs, secure setup, modern booking." />

	<style>
		:root {
			--bg-1: #0b1220;
			--bg-2: #0f172a;
			--card: rgba(255,255,255,0.08);
			--card-2: rgba(255,255,255,0.05);
			--border: rgba(255,255,255,0.12);
			--text: #ffffff;
			--muted: rgba(255,255,255,0.72);
			--blue: #2563eb;
			--blue-dark: #1d4ed8;
			--blue-soft: rgba(37,99,235,0.18);
			--shadow: 0 20px 50px rgba(0,0,0,0.35);
			--radius: 18px;
			--radius-sm: 12px;
			--max: 1120px;
		}

		* {
			box-sizing: border-box;
		}

		html {
			scroll-behavior: smooth;
		}

		body {
			margin: 0;
			font-family: Inter, Arial, Helvetica, sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at top, rgba(37,99,235,0.18), transparent 28%),
				linear-gradient(160deg, var(--bg-1), var(--bg-2) 60%, #0a1020);
			min-height: 100vh;
		}

		a {
			color: #8ab4ff;
			text-decoration: none;
		}

		a:hover {
			color: #b7d0ff;
		}

		.wrapper {
			width: min(var(--max), calc(100% - 2rem));
			margin: 0 auto;
		}

		.topbar {
			position: sticky;
			top: 0;
			z-index: 10;
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			background: rgba(11,18,32,0.55);
			border-bottom: 1px solid rgba(255,255,255,0.08);
		}

		.nav {
			width: min(var(--max), calc(100% - 2rem));
			margin: 0 auto;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 1rem 0;
		}

		.brand {
			display: inline-flex;
			align-items: center;
			gap: 0.7rem;
			font-weight: 800;
			letter-spacing: 0.1rem;
			font-size: 1rem;
			color: var(--text);
		}

		.brand:hover {
			color: var(--text);
		}

		.brand-logo {
			width: 38px;
			height: 38px;
			object-fit: contain;
			display: block;
			filter: drop-shadow(0 6px 18px rgba(37,99,235,0.28));
		}

		.brand-text {
			line-height: 1;
		}

		.nav-links {
			display: flex;
			gap: 0.9rem;
			flex-wrap: wrap;
			justify-content: flex-end;
		}

		.nav-links a {
			padding: 0.7rem 1rem;
			border-radius: 999px;
			color: var(--muted);
			transition: 0.2s ease;
			border: 1px solid transparent;
		}

		.nav-links a:hover {
			color: var(--text);
			background: rgba(255,255,255,0.05);
			border-color: rgba(255,255,255,0.08);
		}

		.hero {
			padding: 5.5rem 0 3rem;
		}

		.hero-grid {
			display: grid;
			grid-template-columns: 1.15fr 0.85fr;
			gap: 1.4rem;
			align-items: stretch;
		}

		.panel {
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
		}

		.hero-copy {
			padding: 2rem;
		}

		.kicker {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			padding: 0.45rem 0.8rem;
			border-radius: 999px;
			background: rgba(255,255,255,0.06);
			border: 1px solid rgba(255,255,255,0.08);
			color: var(--muted);
			font-size: 0.9rem;
			margin-bottom: 1rem;
		}

		h1, h2, h3 {
			margin-top: 0;
		}

		h1 {
			font-size: clamp(2.4rem, 5vw, 4.8rem);
			line-height: 0.95;
			letter-spacing: -0.04em;
			margin-bottom: 1rem;
		}

		.hero-copy p {
			color: var(--muted);
			font-size: 1.02rem;
			line-height: 1.7;
			max-width: 52rem;
		}

		.hero-actions {
			display: flex;
			gap: 0.8rem;
			flex-wrap: wrap;
			margin-top: 1.35rem;
		}

		.button,
		button {
			appearance: none;
			border: 0;
			cursor: pointer;
			font: inherit;
			border-radius: 12px;
			padding: 0.95rem 1.1rem;
			transition: 0.2s ease;
		}

		.button.primary,
		button.primary {
			background: var(--blue);
			color: white;
			box-shadow: 0 14px 30px rgba(37,99,235,0.28);
		}

		.button.primary:hover,
		button.primary:hover {
			background: var(--blue-dark);
			transform: translateY(-1px);
		}

		.button.secondary,
		button.secondary {
			background: rgba(255,255,255,0.06);
			color: white;
			border: 1px solid rgba(255,255,255,0.1);
		}

		.button.secondary:hover,
		button.secondary:hover {
			background: rgba(255,255,255,0.1);
		}

		.quick-stats {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 0.9rem;
			margin-top: 1.6rem;
		}

		.stat {
			padding: 1rem;
			border-radius: 14px;
			background: var(--card-2);
			border: 1px solid rgba(255,255,255,0.08);
			text-align: center;
		}

		.stat strong {
			display: block;
			font-size: 1rem;
			margin-bottom: 0.3rem;
		}

		.stat span {
			color: var(--muted);
			font-size: 0.92rem;
		}

		.hero-card {
			padding: 1.5rem;
			display: flex;
			flex-direction: column;
			justify-content: center;
			background:
				linear-gradient(180deg, rgba(37,99,235,0.2), rgba(255,255,255,0.02)),
				var(--card);
		}

		.hero-card .mock {
			border-radius: 16px;
			border: 1px solid rgba(255,255,255,0.1);
			background: rgba(10,16,32,0.7);
			padding: 1rem;
		}

		.mock-screen {
			height: 220px;
			border-radius: 14px;
			background:
				linear-gradient(145deg, rgba(37,99,235,0.28), rgba(255,255,255,0.04)),
				radial-gradient(circle at 20% 20%, rgba(255,255,255,0.18), transparent 28%),
				#0d1528;
			border: 1px solid rgba(255,255,255,0.08);
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
		}

		.hero-img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
			border-radius: 12px;
			opacity: 0;
			transform: translateY(24px) scale(1.01);
			animation: heroFadeUp 0.95s ease forwards;
			transition: transform 0.5s ease, filter 0.4s ease;
			filter: saturate(1.02) contrast(1.02);
		}

		.mock-screen:hover .hero-img {
			transform: scale(1.035);
		}

		@keyframes heroFadeUp {
			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		.section {
			padding: 1.2rem 0 1.6rem;
		}

		.section-title {
			font-size: 1.7rem;
			margin-bottom: 0.35rem;
		}

		.section-sub {
			color: var(--muted);
			margin-bottom: 1.3rem;
		}

		.cards-3 {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 1rem;
		}

		.card {
			padding: 1.2rem;
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 16px;
			box-shadow: var(--shadow);
		}

		.card h3 {
			font-size: 1.05rem;
			margin-bottom: 0.6rem;
		}

		.card p {
			margin: 0;
			color: var(--muted);
			line-height: 1.65;
		}

		.quote-wrap {
			display: grid;
			grid-template-columns: 1.1fr 0.9fr;
			gap: 1rem;
		}

		.quote-box,
		.contact-box {
			padding: 1.3rem;
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 16px;
			box-shadow: var(--shadow);
		}

		.fields {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 0.9rem;
		}

		.field {
			text-align: left;
		}

		.field.full {
			grid-column: 1 / -1;
		}

		label {
			display: block;
			margin-bottom: 0.45rem;
			color: rgba(255,255,255,0.86);
			font-size: 0.92rem;
			font-weight: 600;
		}

		select,
		input,
		textarea {
			width: 100%;
			padding: 0.95rem 1rem;
			border-radius: 12px;
			border: 1px solid rgba(255,255,255,0.12);
			background: rgba(255,255,255,0.06);
			color: white;
			font: inherit;
			outline: none;
		}

		select option {
			color: black;
		}

		input::placeholder,
		textarea::placeholder {
			color: rgba(255,255,255,0.42);
		}

		select:focus,
		input:focus,
		textarea:focus {
			border-color: rgba(138,180,255,0.8);
			box-shadow: 0 0 0 4px rgba(37,99,235,0.18);
		}

		.actions {
			display: flex;
			flex-wrap: wrap;
			gap: 0.7rem;
			margin-top: 1rem;
		}

		.quote-result {
			display: none;
			margin-top: 1rem;
			padding: 1rem;
			border-radius: 14px;
			border: 1px solid rgba(37,99,235,0.32);
			background: var(--blue-soft);
		}

		.quote-result h3 {
			margin-bottom: 0.6rem;
		}

		.quote-breakdown {
			color: var(--muted);
			line-height: 1.55;
			margin-bottom: 1rem;
		}

		.price-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 1rem;
			padding: 0.65rem 0;
			border-bottom: 1px solid rgba(255,255,255,0.08);
		}

		.price-row:last-of-type {
			border-bottom: 0;
		}

		.price-row strong {
			font-size: 0.98rem;
		}

		.price-val {
			font-weight: 800;
			font-size: 1.05rem;
		}

		.quote-note {
			color: var(--muted);
			font-size: 0.92rem;
			line-height: 1.6;
			margin-top: 0.8rem;
		}

		.contact-lines p {
			margin: 0 0 1rem 0;
			color: var(--muted);
			line-height: 1.6;
		}

		.contact-lines strong {
			color: white;
		}

		.footer {
			padding: 2rem 0 3rem;
			text-align: center;
			color: var(--muted);
			font-size: 0.92rem;
		}

		@media (max-width: 980px) {
			.hero-grid,
			.quote-wrap,
			.cards-3 {
				grid-template-columns: 1fr;
			}
		}

		@media (max-width: 680px) {
			.nav {
				flex-direction: column;
				gap: 0.9rem;
				align-items: flex-start;
			}

			.nav-links {
				justify-content: flex-start;
			}

			.fields,
			.quick-stats {
				grid-template-columns: 1fr;
			}

			.hero {
				padding-top: 4.5rem;
			}

			h1 {
				font-size: 2.5rem;
			}

			.brand-logo {
				width: 34px;
				height: 34px;
			}
		}
	</style>
</head>
<body>

	<div class="topbar">
		<div class="nav">
			<a href="#home" class="brand">
				<img src="images/logo.png" alt="SnapMount logo" class="brand-logo" />
				<span class="brand-text">SNAPMOUNT</span>
			</a>
			<div class="nav-links">
				<a href="#home">Home</a>
				<a href="#services">Services</a>
				<a href="#quote">Quote</a>
				<a href="#contact">Contact</a>
			</div>
		</div>
	</div>

	<section class="hero wrapper" id="home">
		<div class="hero-grid">
			<div class="panel hero-copy">
				<div class="kicker">Phoenix, Arizona • TV Mounting</div>
				<h1>Clean installs.<br>Sharp finish.</h1>
				<p>
					Professional TV mounting with a smoother, more premium booking experience.
					Get an exact estimate, choose how you want to pay, and move forward without the usual headache.
				</p>

				<div class="hero-actions">
					<a href="#quote" class="button primary">Get Exact Quote</a>
					<a href="tel:6025823932"
